<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 12px 14px;
      width: 260px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 600;
      color: #89b4fa;
    }
    .version {
      font-size: 11px;
      color: #666;
      font-weight: 400;
      margin-left: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      cursor: pointer;
    }
    label input[type="checkbox"] {
      accent-color: #89b4fa;
      width: 16px;
      height: 16px;
    }
    .divider {
      height: 1px;
      background: #333;
      margin: 10px 0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #252536;
      color: #cdd6f4;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #89b4fa;
      color: #1e1e2e;
      border-color: #89b4fa;
    }
    .btn + .btn {
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h3>FrontScript Helper <span class="version">v2.0</span></h3>

  <label>
    <input type="checkbox" id="toggleTooltips" checked />
    Enable Tooltips
  </label>

  <label>
    <input type="checkbox" id="toggleAutocomplete" checked />
    Enable Autocomplete
  </label>

  <div class="divider"></div>

  <button class="btn" id="openPanel">Open Reference Panel</button>

  <script>
    const toggleTooltips = document.getElementById('toggleTooltips');
    const toggleAutocomplete = document.getElementById('toggleAutocomplete');
    const openPanelBtn = document.getElementById('openPanel');

    // Load saved states
    chrome.storage.local.get(['tooltipEnabled', 'autocompleteEnabled'], (result) => {
      toggleTooltips.checked = result.tooltipEnabled !== false;
      toggleAutocomplete.checked = result.autocompleteEnabled !== false;
    });

    // Save toggle states
    toggleTooltips.addEventListener('change', (e) => {
      chrome.storage.local.set({ tooltipEnabled: e.target.checked });
    });

    toggleAutocomplete.addEventListener('change', (e) => {
      chrome.storage.local.set({ autocompleteEnabled: e.target.checked });
    });

    // Open side panel
    openPanelBtn.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: "OPEN_SIDE_PANEL" });
      window.close();
    });

    // Handle tooltip enabled queries from content script
    chrome.runtime.onMessage.addListener((message, sender, sendResponse) => {
      if (message.type === "GET_TOOLTIP_ENABLED") {
        chrome.storage.local.get("tooltipEnabled", ({ tooltipEnabled }) => {
          sendResponse({ tooltipEnabled });
        });
        return true;
      }
    });
  </script>
</body>
</html>
